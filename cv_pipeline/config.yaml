model_path: cv_pipeline/detection/weights/best.pt
video_source: ""
output_path: cv_pipeline/output/annotated_output.mp4

table:
  warp_points: []
  dealer_zone_ratio: 0.4

overlay:
  show_hud: true
  show_bboxes: true

counting:
  decks_total: 6
  bet_spread:
    "<=1": 1
    "2": 2
    "3": 4
    ">=4": 6

tracking:
  max_missed_frames: 10
  iou_match_threshold: 0.3

training:
  data_yaml: cv_pipeline/data/processed/data.yaml
  epochs: 100
  patience: 15
  imgsz: 640
  train_aug_per_image: 1
